kind = "web"
previewPath = "/"
title = "Task & Compliance Tracker"
version = "1.0.0"
id = "artifacts/task-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26124

[services.development]
run = "pnpm --filter @workspace/task-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/task-tracker", "run", "build" ]
publicDir = "artifacts/task-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26124"
BASE_PATH = "/"
